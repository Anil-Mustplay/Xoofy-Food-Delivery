<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xoofy — Food Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #7C3AED;
    --ember: #9333EA;
    --gold: #F97316;
    --cream: #FDF6FF;
    --dark: #1E0A3C;
    --charcoal: #3B1A6E;
    --smoke: #6B4F8A;
    --light-smoke: #B8A5D4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 5%;
    background: rgba(255,248,239,0.96);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,60,31,0.12);
    gap: 1rem;
  }
  .nav-logo {
    font-family: 'Nunito', 'DM Sans', sans-serif;
    font-size: 1.6rem; font-weight: 900;
    color: var(--fire);
    letter-spacing: -0.5px;
    line-height: 1;
    display: inline-block;
    padding: 0.1rem 0;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-logo span { color: var(--fire); }

  /* Logo + location block */
  .nav-brand {
    display: flex; flex-direction: column; gap: 0.15rem; flex-shrink: 0;
  }
  .nav-location-bar {
    display: flex; align-items: center; gap: 0.3rem;
    cursor: pointer; max-width: 220px;
  }
  .nav-location-icon { font-size: 0.75rem; color: var(--fire); flex-shrink: 0; }
  .nav-location-text {
    font-size: 0.78rem; font-weight: 600; color: var(--dark);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 160px;
  }
  .nav-location-sub {
    font-size: 0.68rem; color: var(--smoke);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 160px; line-height: 1;
  }
  .nav-location-chevron { font-size: 0.65rem; color: var(--smoke); flex-shrink: 0; }

  /* Location dropdown */
  .loc-dropdown {
    display: none; position: fixed; top: 62px; left: 5%; z-index: 200;
    background: #fff; border-radius: 20px; width: 300px;
    box-shadow: 0 12px 50px rgba(26,10,0,0.18);
    border: 1px solid rgba(255,60,31,0.1);
    overflow: hidden; animation: locDrop 0.2s ease;
  }
  .loc-dropdown.open { display: block; }
  @keyframes locDrop { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .loc-header { padding: 1rem 1.2rem 0.6rem; border-bottom: 1px solid #f5ede3; }
  .loc-header-title { font-size: 0.72rem; font-weight: 700; color: var(--smoke); text-transform: uppercase; letter-spacing: 0.5px; }
  .loc-addr-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.85rem 1.2rem; cursor: pointer; transition: background 0.15s;
  }
  .loc-addr-item:hover { background: #FFF8EF; }
  .loc-addr-item.active { background: rgba(255,60,31,0.06); }
  .loc-addr-icon { font-size: 1.1rem; flex-shrink: 0; }
  .loc-addr-info { flex: 1; min-width: 0; }
  .loc-addr-name { font-size: 0.88rem; font-weight: 600; color: var(--dark); display: flex; align-items: center; gap: 0.4rem; }
  .loc-addr-street { font-size: 0.76rem; color: var(--smoke); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .loc-active-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--fire); flex-shrink: 0; }
  .loc-divider { height: 1px; background: #f5ede3; }
  .loc-add-btn {
    display: flex; align-items: center; gap: 0.7rem;
    padding: 0.85rem 1.2rem; cursor: pointer;
    color: var(--fire); font-size: 0.88rem; font-weight: 600;
    transition: background 0.15s;
  }
  .loc-add-btn:hover { background: #FFF8EF; }
  .loc-use-current {
    display: flex; align-items: center; gap: 0.7rem;
    padding: 0.85rem 1.2rem; cursor: pointer;
    color: var(--charcoal); font-size: 0.85rem; font-weight: 500;
    transition: background 0.15s; border-top: 1px solid #f5ede3;
  }
  .loc-use-current:hover { background: #FFF8EF; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    text-decoration: none; color: var(--charcoal);
    font-weight: 500; font-size: 0.95rem;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--fire); }
  .nav-cta {
    background: var(--fire); color: #fff;
    padding: 0.65rem 1.6rem; border-radius: 50px;
    font-weight: 600; font-size: 0.9rem;
    text-decoration: none; transition: background 0.2s, transform 0.15s;
  }
  .nav-cta:hover { background: var(--ember); transform: translateY(-1px); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: grid; grid-template-columns: 1fr 1fr;
    align-items: center; gap: 3rem;
    padding: 8rem 5% 4rem;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; top: -20%; right: -10%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, rgba(249,115,22,0.08) 50%, transparent 70%);
    border-radius: 50%; pointer-events: none;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(255,60,31,0.1); border: 1px solid rgba(255,60,31,0.25);
    color: var(--fire); padding: 0.4rem 1rem; border-radius: 50px;
    font-size: 0.82rem; font-weight: 600; letter-spacing: 0.5px;
    margin-bottom: 1.5rem; animation: fadeUp 0.6s ease both;
  }
  .hero-badge::before { content: '🔥'; font-size: 0.9rem; }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 5vw, 4.5rem);
    font-weight: 900; line-height: 1.08;
    color: var(--dark);
    animation: fadeUp 0.7s 0.1s ease both;
  }
  .hero h1 em {
    font-style: italic; color: var(--fire);
    display: block;
  }
  .hero-sub {
    margin-top: 1.5rem; font-size: 1.1rem;
    color: var(--smoke); line-height: 1.7; max-width: 440px;
    animation: fadeUp 0.7s 0.2s ease both;
  }
  .hero-search {
    margin-top: 2.5rem;
    display: flex; gap: 0;
    background: #fff; border-radius: 60px;
    box-shadow: 0 8px 40px rgba(26,10,0,0.12);
    overflow: hidden; max-width: 480px;
    animation: fadeUp 0.7s 0.3s ease both;
  }
  .hero-search input {
    flex: 1; border: none; outline: none;
    padding: 1.1rem 1.5rem; font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif; color: var(--dark);
    background: transparent;
  }
  .hero-search input::placeholder { color: var(--light-smoke); }
  .hero-search button {
    background: var(--fire); color: #fff; border: none;
    padding: 0.9rem 1.8rem; cursor: pointer;
    font-weight: 600; font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.2s; white-space: nowrap;
  }
  .hero-search button:hover { background: var(--ember); }
  .hero-stats {
    display: flex; gap: 2.5rem; margin-top: 2.5rem;
    animation: fadeUp 0.7s 0.4s ease both;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 700; color: var(--fire);
    display: block; line-height: 1;
  }
  .stat-label { font-size: 0.82rem; color: var(--smoke); margin-top: 0.3rem; }

  .hero-visual {
    position: relative; display: flex;
    justify-content: center; align-items: center;
    animation: fadeIn 1s 0.2s ease both;
  }
  .hero-plate {
    width: 420px; height: 420px; border-radius: 50%;
    background: linear-gradient(135deg, #F5F0FF 0%, #EDD9FF 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 10rem; box-shadow: 0 20px 80px rgba(255,60,31,0.2);
    position: relative; animation: float 4s ease-in-out infinite;
  }
  .hero-tag {
    position: absolute; background: #fff;
    border-radius: 16px; padding: 0.8rem 1.2rem;
    box-shadow: 0 8px 30px rgba(26,10,0,0.12);
    font-size: 0.85rem; font-weight: 600;
  }
  .tag1 { top: 8%; left: -5%; animation: float 4s 0.5s ease-in-out infinite; }
  .tag2 { bottom: 15%; right: -8%; animation: float 4s 1s ease-in-out infinite; }
  .tag3 { top: 45%; right: -12%; animation: float 4s 1.5s ease-in-out infinite; }
  .tag-icon { font-size: 1.2rem; margin-right: 0.4rem; }

  /* CATEGORIES */
  .categories {
    padding: 5rem 5%;
    background: var(--dark);
  }
  .section-label {
    font-size: 0.8rem; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 0.8rem;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 3.5vw, 2.8rem);
    font-weight: 700; color: #fff; margin-bottom: 3rem;
  }
  .category-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 1.2rem;
  }
  .category-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 1.5rem 1rem;
    text-align: center; cursor: pointer;
    transition: all 0.25s; text-decoration: none;
    display: block;
  }
  .category-card:hover {
    background: rgba(255,60,31,0.15);
    border-color: rgba(255,60,31,0.4);
    transform: translateY(-4px);
  }
  .category-emoji { font-size: 2.5rem; display: block; margin-bottom: 0.6rem; }
  .category-name { color: #fff; font-size: 0.9rem; font-weight: 500; }

  /* FEATURED MENU */
  .menu {
    padding: 5rem 5%;
    background: var(--cream);
  }
  .menu-header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 3rem; flex-wrap: wrap; gap: 1rem;
  }
  .menu-tabs {
    display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem;
  }
  .tab {
    padding: 0.5rem 1.3rem; border-radius: 50px;
    border: 1.5px solid rgba(26,10,0,0.15);
    background: transparent; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 500; color: var(--smoke);
    transition: all 0.2s;
  }
  .tab.active, .tab:hover {
    background: var(--fire); border-color: var(--fire);
    color: #fff;
  }
  .see-all {
    color: var(--fire); font-weight: 600; text-decoration: none;
    font-size: 0.9rem; white-space: nowrap;
  }
  .menu-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
  }
  .food-card {
    background: #fff; border-radius: 24px;
    overflow: hidden; box-shadow: 0 4px 20px rgba(26,10,0,0.06);
    transition: transform 0.25s, box-shadow 0.25s; cursor: default;
  }
  .food-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 40px rgba(26,10,0,0.12);
  }
  .food-img {
    height: 180px; display: flex; align-items: center;
    justify-content: center; font-size: 5rem;
    position: relative;
  }
  .food-img-bg1 { background: linear-gradient(135deg, #FFF0E0, #FFD4A8); }
  .food-img-bg2 { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); }
  .food-img-bg3 { background: linear-gradient(135deg, #FFF3E0, #FFCC80); }
  .food-img-bg4 { background: linear-gradient(135deg, #FCE4EC, #F8BBD9); }
  .food-img-bg5 { background: linear-gradient(135deg, #E3F2FD, #BBDEFB); }
  .food-img-bg6 { background: linear-gradient(135deg, #F3E5F5, #E1BEE7); }
  .badge-new, .badge-hot {
    position: absolute; top: 12px; left: 12px;
    padding: 0.3rem 0.8rem; border-radius: 50px;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px;
  }
  .badge-new { background: var(--gold); color: var(--dark); }
  .badge-hot { background: var(--fire); color: #fff; }
  .food-info { padding: 1.2rem; }
  .food-name {
    font-weight: 600; font-size: 1rem; color: var(--dark);
    margin-bottom: 0.3rem;
  }
  .food-desc { font-size: 0.82rem; color: var(--smoke); margin-bottom: 0.9rem; line-height: 1.5; }
  .food-footer {
    display: flex; justify-content: space-between; align-items: center;
  }
  .food-price {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; font-weight: 700; color: var(--fire);
  }
  .food-meta { display: flex; align-items: center; gap: 1rem; }
  .meta-item { font-size: 0.78rem; color: var(--smoke); display: flex; align-items: center; gap: 0.25rem; }
  .add-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--fire); color: #fff; border: none;
    font-size: 1.3rem; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
  }
  .add-btn:hover { background: var(--ember); transform: scale(1.1); }

  /* HOW IT WORKS */
  .how {
    padding: 5rem 5%;
    background: linear-gradient(135deg, #1E0A3C 0%, #3B1A6E 100%);
    position: relative; overflow: hidden;
  }
  .how::before {
    content: '';
    position: absolute; bottom: -20%; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, rgba(255,182,39,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .how .section-title { color: #fff; }
  .steps-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 2rem; margin-top: 3rem; position: relative;
  }
  .step {
    text-align: center; padding: 2rem 1.5rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px; position: relative;
  }
  .step-num {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem; font-weight: 900;
    color: rgba(255,182,39,0.15); line-height: 1;
    position: absolute; top: 1rem; right: 1.5rem;
  }
  .step-icon { font-size: 2.8rem; margin-bottom: 1rem; display: block; }
  .step h3 { color: #fff; font-size: 1.1rem; font-weight: 600; margin-bottom: 0.6rem; }
  .step p { color: rgba(255,255,255,0.5); font-size: 0.88rem; line-height: 1.6; }

  /* TESTIMONIALS */
  .reviews {
    padding: 5rem 5%;
    background: var(--cream);
  }
  .reviews-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem; margin-top: 3rem;
  }
  .review-card {
    background: #fff; border-radius: 20px;
    padding: 1.8rem; box-shadow: 0 4px 20px rgba(26,10,0,0.06);
    transition: transform 0.2s;
  }
  .review-card:hover { transform: translateY(-3px); }
  .stars { color: var(--gold); font-size: 1rem; margin-bottom: 1rem; letter-spacing: 2px; }
  .review-text { color: var(--charcoal); font-size: 0.92rem; line-height: 1.7; margin-bottom: 1.2rem; }
  .reviewer { display: flex; align-items: center; gap: 0.8rem; }
  .reviewer-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; flex-shrink: 0;
  }
  .av1 { background: #FFE0C0; }
  .av2 { background: #C8E6C9; }
  .av3 { background: #BBDEFB; }
  .reviewer-name { font-weight: 600; font-size: 0.9rem; color: var(--dark); }
  .reviewer-loc { font-size: 0.78rem; color: var(--smoke); }

  /* CTA BANNER */
  .cta-banner {
    margin: 0 5% 5rem;
    background: linear-gradient(135deg, #7C3AED 0%, #9333EA 50%, #F97316 100%);
    border-radius: 32px; padding: 4rem 5%;
    display: flex; align-items: center; justify-content: space-between;
    gap: 2rem; flex-wrap: wrap; position: relative; overflow: hidden;
  }
  .cta-banner::after {
    content: '🍕🍔🌮🍜';
    position: absolute; right: 5%; top: 50%;
    transform: translateY(-50%);
    font-size: 4rem; opacity: 0.15; letter-spacing: 0.5rem;
  }
  .cta-banner h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 3vw, 2.5rem);
    color: #fff; font-weight: 900; max-width: 480px;
  }
  .cta-banner p { color: rgba(255,255,255,0.8); margin-top: 0.5rem; font-size: 1rem; }
  .cta-banner-btn {
    background: #fff; color: var(--fire);
    padding: 1rem 2.5rem; border-radius: 50px;
    font-weight: 700; font-size: 1rem;
    text-decoration: none; white-space: nowrap;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    flex-shrink: 0;
  }
  .cta-banner-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }

  /* FOOTER */
  footer {
    background: var(--dark); padding: 4rem 5% 2rem;
  }
  .footer-grid {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 3rem; margin-bottom: 3rem;
  }
  .footer-brand .nav-logo { font-size: 1.5rem; display: block; margin-bottom: 1rem; }
  .footer-desc { color: rgba(255,255,255,0.4); font-size: 0.88rem; line-height: 1.7; max-width: 260px; }
  .footer-socials { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
  .social-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; text-decoration: none; transition: background 0.2s;
  }
  .social-btn:hover { background: rgba(255,60,31,0.3); }
  .footer-col h4 { color: #fff; font-size: 0.9rem; font-weight: 600; margin-bottom: 1.2rem; }
  .footer-col ul { list-style: none; }
  .footer-col li { margin-bottom: 0.7rem; }
  .footer-col a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.87rem; transition: color 0.2s; }
  .footer-col a:hover { color: var(--gold); }
  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,0.07);
    padding-top: 2rem; display: flex;
    justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 1rem;
  }
  .footer-bottom p { color: rgba(255,255,255,0.25); font-size: 0.82rem; }

  /* CART FLOAT */
  .cart-float {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 99;
    background: var(--fire); color: #fff;
    padding: 1rem 1.8rem; border-radius: 50px;
    display: flex; align-items: center; gap: 0.8rem;
    box-shadow: 0 8px 30px rgba(255,60,31,0.4);
    cursor: pointer; font-weight: 600;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: float 3s ease-in-out infinite;
  }
  .cart-float:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 40px rgba(255,60,31,0.5); }
  .cart-count {
    background: var(--gold); color: var(--dark);
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* RESPONSIVE */
  /* ═══════════════════════════════════════
     MOBILE RESPONSIVE — all breakpoints
  ═══════════════════════════════════════ */

  /* ── 768px: tablets & large phones ── */
  @media (max-width: 768px) {

    /* NAV */
    nav { padding: 0.6rem 4%; gap: 0.6rem; }
    nav .nav-links { display: none; }
    .nav-logo { font-size: 1.25rem; }
    .nav-location-text { max-width: 120px; font-size: 0.72rem; }
    .nav-location-sub  { max-width: 120px; font-size: 0.64rem; }
    .loc-dropdown { left: 4%; width: calc(92vw); top: 58px; }

    /* HERO */
    .hero {
      grid-template-columns: 1fr;
      text-align: center;
      padding: 6rem 5% 3rem;
      gap: 2rem;
      min-height: auto;
    }
    .hero-visual { display: none; }
    .hero-badge { font-size: 0.75rem; padding: 0.35rem 0.9rem; }
    .hero h1 { font-size: clamp(2rem, 8vw, 3rem); }
    .hero-sub { font-size: 0.95rem; max-width: 100%; margin: 1rem auto 0; }
    .hero-search {
      max-width: 100%;
      margin-top: 1.8rem;
      flex-direction: row;
    }
    .hero-search input { padding: 0.9rem 1rem; font-size: 0.88rem; }
    .hero-search button { padding: 0.9rem 1.2rem; font-size: 0.85rem; }
    .hero-stats { justify-content: center; gap: 1.8rem; margin-top: 2rem; }
